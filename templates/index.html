<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="header">
    <h1> IoT Temperature Dashboard </h1>
    </div>
    <div class="indicator">
       <button class="led-online">Start</button>
       <button class="led-alert">Alert</button>
    </div>
    

    <div class="stats">
        <div class="card" id="temp-card">Temp: <span id="temp-value">--</span>*C</div>
        <div class="card" id="humidity-card">Humidity: <span id="humidity-value">--</span>%</div>
        <div class="card" id="status-card">Status: <span id="led-status">--</span></div>
        
    </div>
    <div class="chart-container">
        <h3>Temperature Graph</h3>
        <canvas id="tempChart"></canvas>
    </div>

    <div class="chart-container">
        <h3> Humidity Graph </h3>
        <canvas id="humidityChart"></canvas>
    </div>
    <script>
        fetch('/readings')
            .then(response => response.json())
            .then(data => {
                const labels = data.readings.map(r => r.timestamp)
                const temps = data.readings.map(r => r.temp)

                new Chart(document.getElementById('tempChart'), {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Temperature',
                            data: temps
                    }]
                    }
                })
                new Chart(document.getElementById('humidityChart'), {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Humidity',
                            data: temps
                        }]
                    }
                })
 })
    </script>
</body>
</html>
